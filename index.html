<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplies Office Form</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #007bff; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .page { display: none; }
        .active { display: block; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #495057; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; margin-top: 5px; }
        .btn-secondary:hover { background: #545b62; }
        
        /* Gaya rekomendasi / autocomplete berdasarkan awalan huruf */
        .autocomplete-suggestions { position: absolute; border: 1px solid #d4d4d4; background: white; width: 100%; z-index: 99; max-height: 150px; overflow-y: auto; }
        .suggestion-item { padding: 10px; cursor: pointer; }
        .suggestion-item:hover { background-color: #e9ecef; }
        
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; }
        .checkbox-item { display: flex; align-items: center; gap: 5px; }
        .checkbox-item input { width: auto; }
    </style>
</head>
<body>

<div class="container">
    <div id="page1" class="page active">
        <h2>Supplies Office - Tahap 1</h2>
        <div class="form-group">
            <label>Nama Karyawan</label>
            <input type="text" id="namaKaryawan" placeholder="Nama Lengkap">
        </div>
        <div class="form-group">
            <label>ID Karyawan</label>
            <input type="text" id="idKaryawan" placeholder="Nomor ID Karyawan">
        </div>
        <div class="form-group">
            <label>Lokasi SO</label>
            <input type="text" id="lokasiSO" oninput="cariLokasiSO(this.value)" placeholder="Ketik Lokasi (Contoh: Be...)">
            <div id="soSuggestions" class="autocomplete-suggestions"></div>
        </div>
        <div class="form-group">
            <label>Tanggal Pengambilan</label>
            <input type="date" id="tanggal">
        </div>
        <button onclick="pindahKePage2()">Lanjut ke Tahap 2</button>
    </div>

    <div id="page2" class="page">
        <h2>Supplies Office - Tahap 2</h2>
        
        <div class="form-group">
            <label>Kategori Barang</label>
            <div class="checkbox-group" id="kategoriContainer">
                </div>
        </div>

        <div class="form-group">
            <label>Nama Barang</label>
            <input type="text" id="namaBarang" oninput="cariNamaBarang(this.value)" placeholder="Ketik Nama Barang (Contoh: Pul...)">
            <div id="barangSuggestions" class="autocomplete-suggestions"></div>
        </div>

        <div class="form-group">
            <label>Quantity (Qty)</label>
            <input type="number" id="qtyBarang" min="1" value="1">
        </div>

        <div class="form-group">
            <label>Satuan Barang (Unit)</label>
            <div class="checkbox-group" id="satuanContainer">
                </div>
        </div>

        <div class="form-group">
            <label>Alasan Pengambilan</label>
            <textarea id="alasan" rows="3" placeholder="Tulis alasan keperluan barang..."></textarea>
        </div>

        <button onclick="kirimFormulir()">KIRIM DATA (FINISH)</button>
        <button class="btn-secondary" onclick="kembaliKePage1()">Kembali</button>
    </div>
</div>

<script>
    // ================= PENGATURAN UTAMA WEBSITE =================
    // 1. CANTUMKAN LINK WEB APP GOOGLE APPS SCRIPT KAMU DI SINI
    const urlWebAppsScript = https://script.google.com/macros/s/AKfycbwVIbJO9DQJv8As4BmXCcnFrKMpDGi0Fv2yM0sPC1rXTbXbVJ7XqgFvTnuLYmGYV_23/exec; 

    // Database Rekomendasi Sesuai Aturan Alur Flowchart (Bisa disesuaikan/diambil dari data sebelumnya)
    const dbLokasiSO = ["Bekasi Kota", "Bekasi Kabupaten", "Jakarta Timur", "Bandung"];
    const dbKategori = ["ATK", "Elektronik", "Pantry", "Lainnya"];
    const dbNamaBarang = ["Pulpen Hitam", "Pulpen Warna", "Kertas A4", "Buku Tulis", "Penghapus"];
    const dbSatuan = ["Pcs", "Box", "Roll", "Pack"];

    // Mengisi Checkbox Kategori & Satuan saat web dimuat
    window.onload = function() {
        // Set tanggal hari ini secara default
        document.getElementById('tanggal').valueAsDate = new Date();

        // Render Checkbox Kategori
        const katContainer = document.getElementById('kategoriContainer');
        dbKategori.forEach(kat => {
            katContainer.innerHTML += `<div class="checkbox-item"><input type="checkbox" name="kategori" value="${kat}"> ${kat}</div>`;
        });

        // Render Checkbox Satuan
        const satContainer = document.getElementById('satuanContainer');
        dbSatuan.forEach(sat => {
            satContainer.innerHTML += `<div class="checkbox-item"><input type="checkbox" name="satuan" value="${sat}"> ${sat}</div>`;
        });
    }

    // ================= LOGIKA AUTOCOMPLETE (REKOMENDASI BERAWALAN HURUF) =================
    function cariLokasiSO(val) {
        let div = document.getElementById('soSuggestions');
        div.innerHTML = "";
        if (!val) return;
        // Mencari rekomendasi yang BERAWALAN kata yang diketik (Sesuai flowchart "Be" -> "Bekasi")
        let hasil = dbLokasiSO.filter(item => item.toLowerCase().startsWith(val.toLowerCase()));
        hasil.forEach(item => {
            div.innerHTML += `<div class="suggestion-item" onclick="pilihSO('${item}')">${item}</div>`;
        });
    }
    function pilihSO(val) {
        document.getElementById('lokasiSO').value = val;
        document.getElementById('soSuggestions').innerHTML = "";
    }

    function cariNamaBarang(val) {
        let div = document.getElementById('barangSuggestions');
        div.innerHTML = "";
        if (!val) return;
        // Mencari rekomendasi berawalan huruf (Sesuai flowchart "Pul" -> "Pulpen Hitam")
        let hasil = dbNamaBarang.filter(item => item.toLowerCase().startsWith(val.toLowerCase()));
        hasil.forEach(item => {
            div.innerHTML += `<div class="suggestion-item" onclick="pilihBarang('${item}')">${item}</div>`;
        });
    }
    function pilihBarang(val) {
        document.getElementById('namaBarang').value = val;
        document.getElementById('barangSuggestions').innerHTML = "";
    }

    // ================= NAVIGASI HALAMAN =================
    function pindahKePage2() {
        document.getElementById('page1').classList.remove('active');
        document.getElementById('page2').classList.add('active');
    }
    function kembaliKePage1() {
        document.getElementById('page2').classList.remove('active');
        document.getElementById('page1').classList.add('active');
    }

    // ================= PROSES FINISH & KIRIM KE SPREADSHEET =================
    function kirimFormulir() {
        // Ambil nilai dari checkbox kategori yang terpilih
        let katTerpilih = Array.from(document.querySelectorAll('input[name="kategori"]:checked')).map(el => el.value).join(", ");
        // Ambil nilai dari checkbox satuan yang terpilih
        let satTerpilih = Array.from(document.querySelectorAll('input[name="satuan"]:checked')).map(el => el.value).join(", ");

        // Membuat objek kumpulan data inputan
        const formPayload = {
            namaKaryawan: document.getElementById('namaKaryawan').value,
            idKaryawan: document.getElementById('idKaryawan').value,
            lokasiSO: document.getElementById('lokasiSO').value,
            tanggal: document.getElementById('tanggal').value,
            kategoriBarang: katTerpilih,
            namaBarang: document.getElementById('namaBarang').value,
            qtyBarang: document.getElementById('qtyBarang').value,
            satuanBarang: satTerpilih,
            alasan: document.getElementById('alasan').value
        };

        if(!formPayload.namaKaryawan || !formPayload.namaBarang) {
            alert("Harap isi Nama Karyawan dan Nama Barang terlebih dahulu!");
            return;
        }

        alert("Sedang mengirim data ke Spreadsheet, mohon tunggu...");

        // Mengirim data ke Google Apps Script menggunakan metode POST
        fetch(urlWebAppsScript, {
            method: "POST",
            mode: "no-cors", // Mengabaikan kendala CORS local browser
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formPayload)
        })
        .then(() => {
            alert("DATA BERHASIL DIINPUT SECARA OTOMATIS KE SPREADSHEET!");
            location.reload(); // Reset form kembali ke awal
        })
        .catch(err => {
            alert("Terjadi kesalahan pengiriman: " + err);
        });
    }
</script>

</body>
</html>
