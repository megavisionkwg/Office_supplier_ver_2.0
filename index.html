<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplies Office Form</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #007bff; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .page { display: none; }
        .active { display: block !important; }
        .form-group { margin-bottom: 18px; position: relative; }
        label { display: block; font-weight: bold; margin-bottom: 6px; color: #495057; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus, textarea:focus { border-color: #007bff; outline: none; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; margin-top: 8px; }
        .btn-secondary:hover { background: #545b62; }
        
        /* Dropdown Rekomendasi */
        .autocomplete-suggestions { position: absolute; border: 1px solid #ced4da; border-top: none; background: white; width: 100%; z-index: 99; max-height: 160px; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 0 0 6px 6px; }
        .suggestion-item { padding: 10px 12px; cursor: pointer; font-size: 14px; }
        .suggestion-item:hover { background-color: #f1f7ff; color: #007bff; }
        
        .radio-group { display: flex; flex-wrap: wrap; gap: 12px; padding: 5px 0; }
        .radio-item { display: flex; align-items: center; gap: 6px; background: #f8f9fa; padding: 8px 12px; border: 1px solid #dee2e6; border-radius: 6px; cursor: pointer; }
        .radio-item input { width: auto; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="page1" class="page active">
        <h2>Supplies Office - Tahap 1</h2>
        <div class="form-group">
            <label>Nama Karyawan</label>
            <input type="text" id="namaKaryawan" placeholder="Nama Lengkap">
        </div>
        <div class="form-group">
            <label>ID Karyawan</label>
            <input type="text" id="idKaryawan" placeholder="Nomor ID Karyawan">
        </div>
        <div class="form-group">
            <label>Lokasi SO</label>
            <input type="text" id="lokasiSO" oninput="cariLokasiSO(this.value)" placeholder="Ketik Lokasi (Contoh: Karawang, Bekasi)">
            <div id="soSuggestions" class="autocomplete-suggestions"></div>
        </div>
        <div class="form-group">
            <label>Tanggal Pengambilan</label>
            <input type="date" id="tanggal">
        </div>
        <button type="button" onclick="pindahKePage2()">Lanjut ke Tahap 2</button>
    </div>

    <div id="page2" class="page">
        <h2>Supplies Office - Tahap 2</h2>
        
        <div class="form-group">
            <label>Kategori Barang</label>
            <div class="radio-group" id="kategoriContainer"></div>
        </div>

        <div class="form-group">
            <label>Nama Barang</label>
            <input type="text" id="namaBarang" oninput="cariNamaBarang(this.value)" placeholder="Ketik Nama Barang (Contoh: Kertas, Pulpen)">
            <div id="barangSuggestions" class="autocomplete-suggestions"></div>
        </div>

        <div class="form-group">
            <label>Quantity (Qty)</label>
            <input type="number" id="qtyBarang" min="1" value="1">
        </div>

        <div class="form-group">
            <label>Satuan Barang (Unit)</label>
            <div class="radio-group" id="satuanContainer"></div>
        </div>

        <div class="form-group">
            <label>Alasan Pengambilan</label>
            <textarea id="alasan" rows="3" placeholder="Tulis alasan keperluan barang..."></textarea>
        </div>

        <button type="button" onclick="kirimFormulir()">KIRIM DATA (FINISH)</button>
        <button type="button" class="btn-secondary" onclick="kembaliKePage1()">Kembali</button>
    </div>
</div>

<script>
    // URL Web App Script dan CSV Spreadsheet kamu
    const urlWebAppsScript = "https://script.google.com/macros/s/AKfycbxKKNbDmVPhSkmhCfz4q9vt84WvFNbeqaeqhTCt33ManH8IXTfuhYNTsB-5F1FLyeAe/exec"; 
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-vqAcWw8QQGMTszjk5jpAwEELejt4WaNUUMxFeQZdmv6lZ3BFJfR4Fqk58yA9WPCBiEzhd2KlCmqD/pub?gid=0&single=true&output=csv";

    const dbLokasiSO = ["Bekasi Kota", "Bekasi Kabupaten", "Jakarta Timur", "Bandung", "Karawang"];
    const dbKategori = ["ATK", "Elektronik", "Pantry", "Lainnya"];
    let dataAsetGoogle = [];

    function muatDataAset() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                dataAsetGoogle = results.data.filter(item => item["Nama Item"]);
            }
        });
    }

    window.onload = function() {
        document.getElementById('tanggal').valueAsDate = new Date();
        muatDataAset();

        const katContainer = document.getElementById('kategoriContainer');
        dbKategori.forEach((kat, index) => {
            katContainer.innerHTML += `
                <label class="radio-item">
                    <input type="radio" name="kategori" value="${kat}" ${index === 0 ? 'checked' : ''}> ${kat}
                </label>`;
        });
    };

    function cariLokasiSO(val) {
        let div = document.getElementById('soSuggestions');
        div.innerHTML = "";
        if (!val) return;
        let hasil = dbLokasiSO.filter(item => item.toLowerCase().startsWith(val.toLowerCase()));
        hasil.forEach(item => {
            div.innerHTML += `<div class="suggestion-item" onclick="pilihSO('${item}')">${item}</div>`;
        });
    }
    
    function pilihSO(val) {
        document.getElementById('lokasiSO').value = val;
        document.getElementById('soSuggestions').innerHTML = "";
    }

    function cariNamaBarang(val) {
        let div = document.getElementById('barangSuggestions');
        div.innerHTML = "";
        if (!val) return;
        let hasil = dataAsetGoogle.filter(item => item["Nama Item"] && item["Nama Item"].toLowerCase().includes(val.toLowerCase()));
        hasil.forEach(item => {
            div.innerHTML += `<div class="suggestion-item" onclick="pilihBarang('${item["Nama Item"]}', '${item["Unit"]}')">${item["Nama Item"]} (${item["Asset Code"]})</div>`;
        });
    }
    
    function pilihBarang(nama, unit) {
        document.getElementById('namaBarang').value = nama;
        document.getElementById('barangSuggestions').innerHTML = "";
        
        const satContainer = document.getElementById('satuanContainer');
        satContainer.innerHTML = `
            <label class="radio-item">
                <input type="radio" name="satuan" value="${unit}" checked> ${unit}
            </label>`;
    }

    function pindahKePage2() {
        const nama = document.getElementById('namaKaryawan').value;
        const id = document.getElementById('idKaryawan').value;
        const lokasi = document.getElementById('lokasiSO').value;

        if(!nama || !id || !lokasi) {
            alert("Harap lengkapi semua kolom di Tahap 1 terlebih dahulu!");
            return;
        }

        document.getElementById('page1').classList.remove('active');
        document.getElementById('page2').classList.add('active');
        window.scrollTo(0, 0);
    }

    function kembaliKePage1() {
        document.getElementById('page2').classList.remove('active');
        document.getElementById('page1').classList.add('active');
        window.scrollTo(0, 0);
    }

    function kirimFormulir() {
        let katTerpilih = document.querySelector('input[name="kategori"]:checked')?.value || "";
        let satTerpilih = document.querySelector('input[name="satuan"]:checked')?.value || "";

        const formPayload = {
            namaKaryawan: document.getElementById('namaKaryawan').value,
            idKaryawan: document.getElementById('idKaryawan').value,
            lokasiSO: document.getElementById('lokasiSO').value,
            tanggal: document.getElementById('tanggal').value,
            kategoriBarang: katTerpilih,
            namaBarang: document.getElementById('namaBarang').value,
            qtyBarang: document.getElementById('qtyBarang').value,
            satuanBarang: satTerpilih,
            alasan: document.getElementById('alasan').value
        };

        if(!formPayload.namaBarang) {
            alert("Harap tentukan Nama Barang terlebih dahulu!");
            return;
        }

        alert("Sedang menyimpan data, mohon tunggu...");

        // Menggunakan URLSearchParams agar format data stabil masuk ke Google script tanpa kendala CORS lokal
        fetch(urlWebAppsScript, {
            method: "POST",
            mode: "no-cors", 
            headers: { "Content-Type": "text/plain" }, 
            body: JSON.stringify(formPayload)
        })
        .then(() => {
            alert("DATA BERHASIL DISIMPAN KE SPREADSHEET!");
            location.reload();
        })
        .catch(err => alert("Gagal mengirim: " + err));
    }
</script>
</body>
</html>
